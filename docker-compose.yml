version: "3.9"

services:
  amigos:
    build: .
    env_file: .env
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Persist SQLite databases across container restarts
      - amigos_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  amigos_data:
